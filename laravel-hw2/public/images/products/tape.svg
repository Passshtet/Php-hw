<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <rect width="300" height="200" fill="#f1f5f9"/>
  <!-- Tape body -->
  <rect x="100" y="45" width="90" height="95" rx="10" fill="#eab308"/>
  <rect x="108" y="53" width="74" height="79" rx="6" fill="#fbbf24"/>
  <!-- Inner circle -->
  <circle cx="145" cy="92" r="20" fill="#f1f5f9"/>
  <circle cx="145" cy="92" r="12" fill="#fbbf24"/>
  <!-- Tape strip -->
  <rect x="190" y="55" width="60" height="14" rx="2" fill="#fbbf24"/>
  <rect x="245" y="52" width="8" height="20" rx="1" fill="#dc2626"/>
  <!-- Hook -->
  <rect x="250" y="52" width="3" height="24" fill="#94a3b8"/>
  <!-- Markings -->
  <line x1="195" y1="65" x2="200" y2="65" stroke="#92400e" stroke-width="1"/>
  <line x1="210" y1="65" x2="215" y2="65" stroke="#92400e" stroke-width="1"/>
  <line x1="225" y1="65" x2="230" y2="65" stroke="#92400e" stroke-width="1"/>
  <line x1="240" y1="65" x2="245" y2="65" stroke="#92400e" stroke-width="1"/>
  <!-- Lock button -->
  <rect x="130" y="140" width="30" height="10" rx="3" fill="#92400e"/>
  <text x="150" y="185" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#64748b">Рулетка</text>
</svg>
